name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Next.js build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: 'ci-dummy-api-key'
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: 'ci-dummy.firebaseapp.com'
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'ci-dummy'
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: 'ci-dummy.appspot.com'
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '0'
          NEXT_PUBLIC_FIREBASE_APP_ID: '0:0:web:0'
        run: npm run build
